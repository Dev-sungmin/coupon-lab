spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/coupon
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true